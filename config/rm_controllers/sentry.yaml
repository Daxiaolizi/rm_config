  gimbal_controller:
      type: rm_gimbal_controllers/Controller
      yaw:
        joint: "yaw_joint"
        pid: { p: 0.0, i: 0.0, d: 0.0, i_clamp_max: 0.3, i_clamp_min: -0.3, antiwindup: true, publish_state: true }
        k_chassis_vel: 0.0
      base_yaw:
        joint: "base_yaw_joint"
        pid: { p: 0.0, i: 0.0, d: 0.0, i_clamp_max: 0.3, i_clamp_min: -0.3, antiwindup: true, publish_state: true }
        k_chassis_vel: 0.01
      pitch:
        joint: "pitch_joint"
        pid: { p: 0.3, i: 0.1, d: 0.0, i_clamp_max: 0, i_clamp_min: 0, antiwindup: true, publish_state: true }
      imu_name: "gimbal_imu"
      feedforward:
        gravity: 9.8
        enable_gravity_compensation: false
        mass_origin: [ 0.0,0.0,0.0 ]
      
      bullet_solver:
        resistance_coff_qd_10: 0.0
        resistance_coff_qd_15: 0.01
        resistance_coff_qd_16: 0.0
        resistance_coff_qd_18: 0.01
        resistance_coff_qd_30: 0.01
        g: 9.81
        delay: 0.1
        dt: 0.001
        timeout: 0.001
        publish_rate: 50
      #test begin
      yaw:
        pid_pos:
          p: 0.0      # 比例增益
          i: 0.0      # 积分增益
          d: 0.0      # 微分增益
          i_clamp: 0.0  # 积分限幅（可选）
      pitch:
        pid_pos:
          p: 1.0     # 比例增益
          i: 0.0      # 积分增益
          d: 0.0      # 微分增益
          i_clamp: 0.0  # 积分限幅（可选）
      # 其他参数，如 k_v, accel 等
      yaw:
        k_v: 0.0
        accel: 99.0
      pitch:
        k_v: 0.0
        accel: 99.0
      yaw/k_chassis_vel: 0.0
        # LQR 参数
      a1: 0.1  # 
      a2: 0.1 # 
      j1: 0.8233  # 惯性1
      j2: 0.9424 # 惯性2
      dc: 0.002  # 惯性耦合
      q1: 20.0  # 状态权重1
      q2: 15.0   # 状态权重2
      q3: 20.0  # 状态权重3
      q4: 15.0   # 状态权重4
      r1: 40.0    # 输入权重1
      r2: 40.0  # 输入权重2
      enable_dual_yaw: true

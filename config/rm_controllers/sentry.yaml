controllers:
  joint_state_controller:
    type: joint_state_controller/JointStateController
    publish_rate: 100
  robot_state_controller:
    type: robot_state_controller/RobotStateController
    publish_rate: 100

  gimbal_calibration_controller:
    type: rm_calibration_controllers/MechanicalCalibrationController
    actuator: [ pitch_joint_motor ]
    velocity:
      joint: pitch_joint
      search_velocity: 3.14
      vel_threshold: 1e-1
      pid: { p: 0.1, i: 0, d: 0.0, i_clamp_max: 0.0, i_clamp_min: 0.0, antiwindup: true }
  trigger_calibration_controller:
    type: rm_calibration_controllers/MechanicalCalibrationController
    actuator: [ trigger_joint_motor ]
    velocity:
      joint: trigger_joint
      search_velocity: 3.1415
      vel_threshold: 0.2
      pid: { p: 0.3, i: 0, d: 0.0, i_clamp_max: 0.0, i_clamp_min: 0.0, antiwindup: true }
  barrel_calibration_controller:
    type: rm_calibration_controllers/MechanicalCalibrationController
    actuator: [ barrel_joint_motor ]
    velocity:
      joint: barrel_joint
      search_velocity: -3.14
      vel_threshold: 0.001
      pid: { p: 0.6, i: 4.0, d: 0.0, i_clamp_max: 0.2, i_clamp_min: -0.2, antiwindup: true }

  chassis_controller:
    # ChassisBase
    type: rm_chassis_controllers/SwerveController
    publish_rate: 100
    enable_odom_tf: true
    publish_odom_tf: true
    enable_map_tf: true

    pose_x: 0.0
    pose_y: 0.0
    pose_z: 0.0
    rot_x: 0.0
    rot_y: 0.0
    rot_z: 0.0
    rot_w: 1.0 #red

    #    pose_x: 10.657098266350928
    #    pose_y: 0.6110887063679007
    #    pose_z: 0.2560933912785833
    #    rot_x: -0.025684137868633765
    #    rot_y: -0.006563507265127387
    #    rot_z: 0.9992910761763034
    #    rot_w: 0.0267318257650071 #blue


    #    pose_x: 5.056499951091358
    #    pose_y: 6.232499893035457
    #    pose_z: 6.700123610929481
    #    rot_x: 0.006935437342442171
    #    rot_y: 0.7300775248831372
    #    rot_z: -0.682541512885454
    #    rot_w: -0.03279924629343798 #test

    power:
      effort_coeff: 6.0
      vel_coeff: 0.004
      power_offset: 0.0
    twist_angular: 0.5233
    timeout: 0.1
    max_odom_vel: 10.0
    pid_follow: { p: 0.0, i: 0, d: 0.0, i_max: 0.0, i_min: 0.0, antiwindup: true, publish_state: false }
    twist_covariance_diagonal: [ 0.001, 0.001, 0.001, 0.001, 0.001, 0.001 ]

    #     SwerveController
    modules:
      left_front:
        position: [ 0.181, 0.181 ]
        pivot:
          joint: left_front_pivot_joint
          <<: &pivot_setting
            buffer_threshold: 10.0
            effort_threshold: 0.9
            position_error_threshold: 0.1
            max_reduce_cnt: 100.0 #max_reduce_cnt<=256
            offset: 0.
            pid: { p: 0.8, i: 5.0, d: 0, i_clamp_max: 0.4, i_clamp_min: -0.4, antiwindup: true, publish_state: false }
        wheel:
          joint: left_front_wheel_joint
          <<: &wheel_setting
            radius: 0.049
            pid: { p: 0.3, i: 0, d: 0.0, i_max: 0.0, i_min: 0.0, antiwindup: true, publish_state: false }
      right_front:
        position: [ 0.181, -0.181 ]
        pivot:
          joint: right_front_pivot_joint
          <<: *pivot_setting
        wheel:
          joint: right_front_wheel_joint
          <<: *wheel_setting
      left_back:
        position: [ -0.181, 0.181 ]
        pivot:
          joint: left_back_pivot_joint
          <<: *pivot_setting
        wheel:
          joint: left_back_wheel_joint
          <<: *wheel_setting
      right_back:
        position: [ -0.181, -0.181 ]
        pivot:
          joint: right_back_pivot_joint
          <<: *pivot_setting
        wheel:
          joint: right_back_wheel_joint
          <<: *wheel_setting


